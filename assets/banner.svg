<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070A10"/>
    </linearGradient>

    <!-- Emerald/Shopify Glow Gradient -->
    <radialGradient id="glow-emerald" cx="85%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#96BF48" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#008060" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-cyan" cx="15%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent Gradients -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#95BF47"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#96BF48" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Base Rectangle -->
  <rect width="1200" height="350" rx="16" fill="url(#bg-grad)"/>

  <!-- Background Ambient Glows -->
  <rect width="1200" height="350" rx="16" fill="url(#glow-emerald)"/>
  <rect width="1200" height="350" rx="16" fill="url(#glow-cyan)"/>

  <!-- Grid Pattern overlay for tech vibe -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>

    <line x1="150" y1="0" x2="150" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/>
    <line x1="450" y1="0" x2="450" y2="350"/>
    <line x1="600" y1="0" x2="600" y2="350"/>
    <line x1="750" y1="0" x2="750" y2="350"/>
    <line x1="900" y1="0" x2="900" y2="350"/>
    <line x1="1050" y1="0" x2="1050" y2="350"/>
  </g>

  <!-- Border Frame -->
  <rect x="1" y="1" width="1198" height="348" rx="15" fill="none" stroke="url(#border-grad)" stroke-width="2"/>

  <!-- Top Badge: Available for Upwork Contracts -->
  <g transform="translate(60, 48)">
    <rect width="210" height="32" rx="16" fill="#008060" fill-opacity="0.2" stroke="#008060" stroke-width="1.5"/>
    <circle cx="20" cy="16" r="5" fill="#34D399"/>
    <circle cx="20" cy="16" r="9" fill="#34D399" fill-opacity="0.3"/>
    <text x="36" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#34D399" letter-spacing="0.5">AVAILABLE FOR WORK</text>
  </g>

  <!-- Main Headline -->
  <text x="60" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">
    SAYANTHAN
  </text>

  <!-- Gradient Subtitle -->
  <text x="60" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="url(#text-grad)" letter-spacing="0.2">
    Shopify Partner &amp; Full-Stack E-Commerce Specialist
  </text>

  <!-- Tagline description -->
  <text x="60" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94A3B8" letter-spacing="0.1">
    Custom Shopify Themes  •  Shopify App Development  •  Headless Commerce (Next.js)  •  Core Web Vitals 95+
  </text>

  <!-- Key Value Pills -->
  <!-- Pill 1: Shopify Partner -->
  <g transform="translate(60, 255)">
    <rect width="180" height="38" rx="8" fill="#1E293B" fill-opacity="0.8" stroke="#334155" stroke-width="1"/>
    <path d="M18 12L21 14V26L18 28M18 12L15 14V26L18 28M18 12V28" stroke="#95BF47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#E2E8F0">Shopify Partner</text>
  </g>

  <!-- Pill 2: 100% Job Success Focus -->
  <g transform="translate(255, 255)">
    <rect width="190" height="38" rx="8" fill="#1E293B" fill-opacity="0.8" stroke="#334155" stroke-width="1"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#38BDF8">⚡ High ROI &amp; Speed</text>
  </g>

  <!-- Pill 3: Custom Liquid & React -->
  <g transform="translate(460, 255)">
    <rect width="210" height="38" rx="8" fill="#1E293B" fill-opacity="0.8" stroke="#334155" stroke-width="1"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#F472B6">🛠️ Theme &amp; App Architect</text>
  </g>

  <!-- Decorative Right Side Shopify Branding Elements -->
  <g transform="translate(930, 80)">
    <polygon points="110,0 210,57 210,173 110,230 10,173 10,57" fill="#1E293B" fill-opacity="0.5" stroke="#008060" stroke-width="2"/>
    <polygon points="110,20 190,66 190,164 110,210 30,164 30,66" fill="#0F172A" stroke="#95BF47" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="900" fill="#95BF47">🛍️</text>
    <text x="110" y="145" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="1">SHOPIFY</text>
    <text x="110" y="165" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#34D399">EXPERT</text>
  </g>
</svg>
